<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SchoolBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
  <div class="logo-container">
    <h1 class="logo">School<span class="box">Box</span></h1>
  </div>
  <div class="search-container">
    <input type="text" id="school-search" placeholder="Recherchez votre école...">
    <button id="search-button">Rechercher</button>
  </div>
  <div class="box-container">
    <div class="box" id="school-box">
      <div class="box-lid" id="box-lid"></div>
      <div class="box-content" id="box-content"></div>
    </div>
    <button id="open-box-button">Ouvrir ma Box</button>
  </div>
  <script type="module" src="/js/main.js"></script>
</body>
</html>
