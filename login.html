<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Connexion - SchoolBox</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/auth.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <h1 class="auth-title">School<span class="box">Box</span></h1>
        <p class="auth-subtitle">Connectez-vous à votre compte</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">Connexion</button>
        <button class="auth-tab" data-tab="signup">Inscription</button>
      </div>

      <!-- Formulaire de connexion -->
      <form id="login-form" class="auth-form active">
        <div class="form-group">
          <label for="login-email">Email</label>
          <input type="email" id="login-email" required>
        </div>
        <div class="form-group">
          <label for="login-password">Mot de passe</label>
          <input type="password" id="login-password" required>
        </div>
        <button type="submit" class="auth-button">Se connecter</button>
      </form>

      <!-- Formulaire d'inscription -->
      <form id="signup-form" class="auth-form">
        <div class="form-group">
          <label for="signup-name">Nom complet</label>
          <input type="text" id="signup-name" required>
        </div>
        <div class="form-group">
          <label for="signup-phone">Téléphone</label>
          <input type="tel" id="signup-phone" required>
        </div>
        <div class="form-group">
          <label for="signup-email">Email</label>
          <input type="email" id="signup-email" required>
        </div>
        <div class="form-group">
          <label for="signup-password">Mot de passe</label>
          <input type="password" id="signup-password" required>
        </div>
        <button type="submit" class="auth-button">S'inscrire</button>
      </form>

      <div class="auth-footer">
        <a href="/index.html" class="back-link">← Retour à l'accueil</a>
      </div>
    </div>
  </div>

  <script type="module" src="/js/auth.js"></script>
</body>
</html>
