<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Votre panier | SchoolBox</title>
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/animations.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:FILL@0..1">
  <style>
    :root {
      --primary: #f48c25;
      --primary-dark: #e67e22;
      --primary-light: rgba(244, 140, 37, 0.1);
      --text: #1a202c;
      --text-muted: #718096;
      --bg: #f7fafc;
      --white: #ffffff;
      --border: #e2e8f0;
      --success: #48bb78;
      --danger: #f56565;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
      --radius: 16px;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .page-header {
      margin-bottom: 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .page-header h1 {
      font-size: 32px;
      font-weight: 900;
    }

    .breadcrumb {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 20px;
    }

    .breadcrumb a {
      color: var(--primary);
      text-decoration: none;
    }

    .cart-content {
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 30px;
    }

    .cart-items {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .cart-header {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .cart-header h2 {
      font-size: 18px;
    }

    .cart-count {
      background: var(--primary-light);
      color: var(--primary);
      padding: 4px 12px;
      border-radius: 99px;
      font-weight: 600;
      font-size: 12px;
    }

    .cart-item {
      padding: 24px;
      border-bottom: 1px solid var(--border);
      display: flex;
      gap: 20px;
      align-items: center;
      transition: background 0.2s;
    }

    .cart-item:hover {
      background: var(--bg);
    }

    .cart-item:last-child {
      border-bottom: none;
    }

    .item-image {
      width: 100px;
      height: 100px;
      background: var(--bg);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .item-details {
      flex: 1;
    }

    .item-name {
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 4px;
    }

    .item-variant {
      font-size: 13px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .item-price {
      font-weight: 700;
      color: var(--primary);
      font-size: 14px;
    }

    .item-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .qty-control {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--bg);
      border-radius: 8px;
      padding: 4px;
    }

    .qty-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px 8px;
      color: var(--primary);
      font-weight: 700;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 4px;
      transition: background 0.2s;
    }

    .qty-btn:hover {
      background: var(--white);
    }

    .qty-value {
      min-width: 30px;
      text-align: center;
      font-weight: 600;
      font-size: 14px;
    }

    .remove-btn {
      background: none;
      border: none;
      color: var(--danger);
      cursor: pointer;
      padding: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      transition: background 0.2s;
    }

    .remove-btn:hover {
      background: rgba(245, 101, 101, 0.1);
    }

    .empty-cart {
      padding: 60px 40px;
      text-align: center;
      background: var(--white);
      border-radius: var(--radius);
    }

    .empty-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }

    .empty-text {
      color: var(--text-muted);
      margin-bottom: 30px;
    }

    .continue-shopping {
      display: inline-block;
      background: var(--primary);
      color: white;
      padding: 12px 32px;
      border-radius: 99px;
      text-decoration: none;
      font-weight: 600;
      transition: all 0.3s;
    }

    .continue-shopping:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .cart-summary {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
      position: sticky;
      top: 20px;
    }

    .summary-title {
      font-size: 16px;
      font-weight: 700;
      margin-bottom: 20px;
      padding-bottom: 20px;
      border-bottom: 1px solid var(--border);
    }

    .summary-line {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .summary-line.total {
      font-weight: 700;
      font-size: 16px;
      margin-top: 16px;
      padding-top: 16px;
      border-top: 2px solid var(--border);
      color: var(--primary);
    }

    .checkout-btn {
      width: 100%;
      background: var(--primary);
      color: white;
      border: none;
      padding: 14px;
      border-radius: var(--radius);
      font-weight: 700;
      cursor: pointer;
      margin-top: 20px;
      transition: all 0.3s;
    }

    .checkout-btn:hover {
      background: var(--primary-dark);
      transform: translateY(-2px);
    }

    .checkout-btn:disabled {
      background: var(--text-muted);
      cursor: not-allowed;
      transform: none;
    }

    .promo-input {
      width: 100%;
      padding: 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 8px;
    }

    .promo-btn {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.2s;
    }

    .promo-btn:hover {
      background: var(--white);
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .cart-content {
        grid-template-columns: 1fr;
      }

      .cart-summary {
        position: static;
      }

      .cart-item {
        flex-wrap: wrap;
      }

      .item-details {
        min-width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="breadcrumb">
      <a href="/index.html">Accueil</a> / <a href="/pages/products.html">Produits</a> / <span>Panier</span>
    </div>

    <div class="page-header">
      <span class="material-symbols-outlined" style="font-size: 32px;">shopping_bag</span>
      <h1>Votre panier</h1>
    </div>

    <div class="cart-content">
      <div class="cart-items">
        <div class="cart-header">
          <h2>Articles</h2>
          <div class="cart-count" id="cart-count">0 article</div>
        </div>
        <div id="cart-items-container">
          <div class="loading">
            <span class="material-symbols-outlined" style="font-size: 32px; animation: spin 1s linear infinite;">refresh</span>
            <p>Chargement du panier...</p>
          </div>
        </div>
      </div>

      <div class="cart-summary">
        <div class="summary-title">Résumé de la commande</div>
        
        <div class="summary-line">
          <span>Sous-total</span>
          <span id="subtotal">0 FCFA</span>
        </div>

        <div class="summary-line">
          <span>Frais de livraison</span>
          <span id="shipping">2 500 FCFA</span>
        </div>

        <div class="summary-line">
          <span>Taxes</span>
          <span id="taxes">0 FCFA</span>
        </div>

        <div class="summary-line total">
          <span>Total</span>
          <span id="total">0 FCFA</span>
        </div>

        <input type="text" class="promo-input" id="promo-code" placeholder="Code promo (optionnel)" />
        <button class="promo-btn" id="apply-promo">Appliquer le code</button>

        <button class="checkout-btn" id="checkout-btn" onclick="proceedToCheckout()">Passer la commande</button>
        <a href="/produits.html" style="display: block; text-align: center; margin-top: 12px; text-decoration: none; color: var(--primary); font-weight: 600;">
          Continuer vos achats
        </a>
      </div>
    </div>
  </div>

  <style>
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>

  <script type="module">
    import { cartService } from '/js/services/cart.service.js';
    import { NotificationService } from '/js/services/api.service.js';

    let currentCart = [];

    // Charger le panier au démarrage
    async function loadCart() {
      try {
        currentCart = await cartService.getCart();
        renderCart();
        updateSummary();
      } catch (error) {
        console.error('Error loading cart:', error);
        NotificationService.error('Erreur lors du chargement du panier');
      }
    }

    // Afficher les articles du panier
    function renderCart() {
      const container = document.getElementById('cart-items-container');
      
      if (currentCart.length === 0) {
        container.innerHTML = `
          <div class="empty-cart">
            <div class="empty-icon">🛒</div>
            <p class="empty-text">Votre panier est vide</p>
            <a href="/produits.html" class="continue-shopping">Commencer vos achats</a>
          </div>
        `;
        return;
      }

      container.innerHTML = currentCart.map((item, index) => `
        <div class="cart-item">
          <div class="item-image">${item.icon || '📦'}</div>
          <div class="item-details">
            <div class="item-name">${item.name}</div>
            <div class="item-variant">${item.variant ? item.variant : ''}</div>
            <div class="item-price">${parseInt(item.price || 0).toLocaleString('fr-FR')} FCFA</div>
          </div>
          <div class="item-actions">
            <div class="qty-control">
              <button class="qty-btn" onclick="changeQuantity(${index}, -1)">−</button>
              <div class="qty-value">${item.quantity || 1}</div>
              <button class="qty-btn" onclick="changeQuantity(${index}, 1)">+</button>
            </div>
            <button class="remove-btn" onclick="removeFromCart(${index})" title="Supprimer">
              <span class="material-symbols-outlined">delete</span>
            </button>
          </div>
        </div>
      `).join('');
    }

    // Changer la quantité
    window.changeQuantity = async function(index, delta) {
      if (index >= 0 && index < currentCart.length) {
        const newQty = (currentCart[index].quantity || 1) + delta;
        if (newQty > 0) {
          currentCart[index].quantity = newQty;
          await cartService.saveCart(currentCart);
          renderCart();
          updateSummary();
        }
      }
    };

    // Supprimer du panier
    window.removeFromCart = async function(index) {
      if (confirm('Êtes-vous sûr de vouloir supprimer cet article?')) {
        currentCart.splice(index, 1);
        await cartService.saveCart(currentCart);
        renderCart();
        updateSummary();
        NotificationService.success('Article supprimé');
      }
    };

    // Mettre à jour le résumé
    function updateSummary() {
      const count = currentCart.length;
      document.getElementById('cart-count').textContent = `${count} article${count > 1 ? 's' : ''}`;

      const subtotal = currentCart.reduce((sum, item) => sum + ((item.price || 0) * (item.quantity || 1)), 0);
      const shipping = currentCart.length > 0 ? 2500 : 0;
      const taxes = Math.round(subtotal * 0.05); // 5% taxes
      const total = subtotal + shipping + taxes;

      document.getElementById('subtotal').textContent = `${subtotal.toLocaleString('fr-FR')} FCFA`;
      document.getElementById('shipping').textContent = `${shipping.toLocaleString('fr-FR')} FCFA`;
      document.getElementById('taxes').textContent = `${taxes.toLocaleString('fr-FR')} FCFA`;
      document.getElementById('total').textContent = `${total.toLocaleString('fr-FR')} FCFA`;

      document.getElementById('checkout-btn').disabled = currentCart.length === 0;
    }

    // Procéder au paiement
    window.proceedToCheckout = function() {
      if (currentCart.length === 0) {
        NotificationService.warning('Votre panier est vide');
        return;
      }
      window.location.href = '/pages/delivery.html';
    };

    // Appliquer code promo
    document.getElementById('apply-promo').addEventListener('click', async () => {
      const code = document.getElementById('promo-code').value.trim();
      if (!code) {
        NotificationService.warning('Veuillez entrer un code promo');
        return;
      }
      
      try {
        const result = await cartService.applyPromoCode(code);
        if (result.success) {
          NotificationService.success('Code promo appliqué!');
          loadCart();
        } else {
          NotificationService.error(result.message || 'Code promo invalide');
        }
      } catch (error) {
        NotificationService.error('Erreur lors de l\'application du code');
      }
    });

    // Charger le panier au démarrage
    loadCart();
  </script>
</body>
</html>
